<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">VIRDERM negative wordmark</title>
  <desc id="desc">Transparent SVG wordmark for black backgrounds: VIR in warm cream and DERM in mustard gold.</desc>
  <style>
    .wordmark {
      font-family: "Cormorant Garamond", "GT Sectra", "Editorial Old", "Bodoni 72", Didot, "Bodoni MT", "Times New Roman", serif;
      font-size: 260px;
      font-weight: 700;
      letter-spacing: -12px;
      dominant-baseline: middle;
      text-anchor: middle;
      font-kerning: normal;
      text-rendering: geometricPrecision;
    }
  </style>
  <text class="wordmark" x="800" y="450">
    <tspan fill="#f5f5f0">VIR</tspan><tspan fill="#d4a017">DERM</tspan>
  </text>
</svg>
